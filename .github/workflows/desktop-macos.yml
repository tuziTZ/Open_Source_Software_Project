name: Desktop macOS Bundle

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - "packages/ui/**"
      - "backend/**"
      - "package.json"
      - "pnpm-lock.yaml"

jobs:
  macos-bundle:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS desktop bundle
        run: pnpm --filter desktop build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mercury-desktop-macos
          path: |
            apps/desktop/target/release/bundle/dmg/*.dmg
            apps/desktop/target/release/bundle/macos/*.app